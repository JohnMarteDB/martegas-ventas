<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MarteGas — Ventas</title>
<meta name="description" content="Resumen sencillo de las ventas de MarteGas: Gas GLP (cocina) y Gas Natural (GNV)." />
<meta name="theme-color" content="#0B5FA5" />
<link rel="stylesheet" href="styles.css?v=4" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
<script src="app.js?v=4" defer></script>
</head>
<body>

<header class="topbar">
  <div class="wrap topbar-in">
    <h1 class="title">MarteGas <span>· Ventas</span></h1>
    <p class="asof" id="asof">Datos al —</p>
  </div>
</header>

<main class="wrap" id="app">

  <!-- 1. Selector de producto -->
  <nav class="products" id="products" aria-label="Elegir producto"></nav>
  <p class="viewing" id="viewing" aria-live="polite"></p>

  <!-- 2. Ventas de este mes (héroe) -->
  <section class="card hero" id="hero"></section>

  <!-- 3. Tarjetas grandes -->
  <section class="kpis" id="kpis"></section>

  <!-- 4. Comparado con el mes pasado -->
  <section class="card verdict" id="cmp-month"></section>

  <!-- 5. Gráfico: ventas mes por mes -->
  <section class="card chart-card">
    <h2 class="card-title" id="chart-title">Ventas mes por mes</h2>
    <p class="chart-range" id="chart-range"></p>
    <div class="toggle" role="group" aria-label="Ver el gráfico en dinero o en cantidad">
      <button type="button" id="t-money" class="toggle-btn is-on" aria-pressed="true">RD$ (dinero)</button>
      <button type="button" id="t-vol" class="toggle-btn" aria-pressed="false">Cantidad</button>
    </div>
    <div class="chart-box">
      <canvas id="barchart" role="img" aria-label="Gráfico de ventas mes por mes"></canvas>
    </div>
    <p class="chart-note" id="chart-note"></p>
  </section>

  <!-- 6. Comparado con el año pasado -->
  <section class="card yoycard" id="cmp-year"></section>

</main>

<footer class="wrap site-foot" id="foot"></footer>

<script>
  // Mensaje claro si el panel no carga (sin tecnicismos).
  window.addEventListener("error", function () {}, true);
</script>
</body>
</html>
